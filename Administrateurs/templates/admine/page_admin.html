
<!-- templates/admin/base.html -->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Administration{% endblock %}</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Configuration des couleurs personnalisées -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#14b8a6',
                        'page-bg': '#f8fafc',
                        'card-white': '#ffffff',
                        'text-main': '#1e293b',
                        'text-secondary': '#94a3b8',
                        'border-light': '#e2e8f0',
                        'border-lighter': '#f1f5f9',
                        success: '#10b981',
                        danger: '#f43f5e',
                        'danger-dark': '#e11d48',
                        accent: '#8b5cf6',
                    }
                }
            }
        }
    </script>
    <!-- Font Awesome pour les icônes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<base target="_blank">
</head>
<body class="bg-page-bg text-text-main font-sans antialiased">
    <div class="flex h-screen overflow-hidden">

        <!-- SIDEBAR -->
        <aside id="sidebar" class="w-64 bg-card-white border-r border-border-light flex flex-col transition-all duration-300 ease-in-out">

            <!-- Logo / Header Sidebar -->
            <div class="h-16 flex items-center px-6 border-b border-border-light">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-primary flex items-center justify-center">
                        <i class="fas fa-shield-alt text-white text-sm"></i>
                    </div>
                    <span class="font-bold text-lg text-text-main">AdminPanel</span>
                </div>
            </div>

            <!-- Navigation Menu -->
            <nav class="flex-1 overflow-y-auto py-4 px-3">
                <ul class="space-y-1">

                    <!-- Dashboard -->
                    <li>
                        <a href="{% url 'admin_dashboard' %}" 
                           class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors duration-200 
                                  {% if request.resolver_match.url_name == 'admin_dashboard' %}
                                      bg-primary/10 text-primary
                                  {% else %}
                                      text-text-secondary hover:bg-border-lighter hover:text-text-main
                                  {% endif %}">
                            <i class="fas fa-home w-5 text-center"></i>
                            <span>Tableau de bord</span>
                        </a>
                    </li>

                    <!-- Gestion Clients -->
                    <li>
                        <a href="{% url 'admin_clients' %}" 
                           class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors duration-200 
                                  {% if request.resolver_match.url_name == 'admin_clients' %}
                                      bg-primary/10 text-primary
                                  {% else %}
                                      text-text-secondary hover:bg-border-lighter hover:text-text-main
                                  {% endif %}">
                            <i class="fas fa-users w-5 text-center"></i>
                            <span>Gestion Clients</span>
                        </a>
                    </li>

                    <!-- Gestion Livreurs -->
                    <li>
                        <a href="{% url 'admin_livreurs' %}" 
                           class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors duration-200 
                                  {% if request.resolver_match.url_name == 'admin_livreurs' %}
                                      bg-primary/10 text-primary
                                  {% else %}
                                      text-text-secondary hover:bg-border-lighter hover:text-text-main
                                  {% endif %}">
                            <i class="fas fa-motorcycle w-5 text-center"></i>
                            <span>Gestion Livreurs</span>
                        </a>
                    </li>

                    <!-- Gestion Commandes -->
                    <li>
                        <a href="{% url 'admin_commandes' %}" 
                           class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors duration-200 
                                  {% if request.resolver_match.url_name == 'admin_commandes' %}
                                      bg-primary/10 text-primary
                                  {% else %}
                                      text-text-secondary hover:bg-border-lighter hover:text-text-main
                                  {% endif %}">
                            <i class="fas fa-shopping-cart w-5 text-center"></i>
                            <span>Gestion Commandes</span>
                        </a>
                    </li>

                    <!-- Gestion Empreinte -->
                    <li>
                        <a href="{% url 'admin_emprunts' %}" 
                           class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors duration-200 
                                  {% if request.resolver_match.url_name == 'admin_emprunts' %}
                                      bg-primary/10 text-primary
                                  {% else %}
                                      text-text-secondary hover:bg-border-lighter hover:text-text-main
                                  {% endif %}">
                            <i class="fas fa-fingerprint w-5 text-center"></i>
                            <span>Gestion Empreinte</span>
                        </a>
                    </li>

                    <!-- Gestion Réservations -->
                    <li>
                        <a href="{% url 'admin_reservations' %}" 
                           class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors duration-200 
                                  {% if request.resolver_match.url_name == 'admin_reservations' %}
                                      bg-primary/10 text-primary
                                  {% else %}
                                      text-text-secondary hover:bg-border-lighter hover:text-text-main
                                  {% endif %}">
                            <i class="fas fa-calendar-alt w-5 text-center"></i>
                            <span>Gestion Réservations</span>
                        </a>
                    </li>

                    <!-- Gestion Paiements -->
                    <li>
                        <a href="{% url 'admin_paiements' %}" 
                           class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors duration-200 
                                  {% if request.resolver_match.url_name == 'admin_paiements' %}
                                      bg-primary/10 text-primary
                                  {% else %}
                                      text-text-secondary hover:bg-border-lighter hover:text-text-main
                                  {% endif %}">
                            <i class="fas fa-credit-card w-5 text-center"></i>
                            <span>Gestion Paiements</span>
                        </a>
                    </li>

                </ul>
            </nav>

            <!-- Footer Sidebar - Déconnexion -->
            <div class="p-3 border-t border-border-light">
                <form method="post" action="{% url 'admin_logout' %}">
                    
                    <button type="submit" 
                            class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium 
                                   text-danger hover:bg-danger/10 transition-colors duration-200">
                        <i class="fas fa-sign-out-alt w-5 text-center"></i>
                        <span>Déconnexion</span>
                    </button>
                </form>
            </div>

        </aside>

        <!-- MAIN CONTENT -->
        <div class="flex-1 flex flex-col overflow-hidden">

            <!-- Top Header -->
            <header class="h-16 bg-card-white border-b border-border-light flex items-center justify-between px-6">
                <div class="flex items-center gap-4">
                    <button id="sidebarToggle" class="lg:hidden p-2 rounded-lg hover:bg-border-lighter transition-colors">
                        <i class="fas fa-bars text-text-secondary"></i>
                    </button>
                    <h1 class="text-xl font-semibold text-text-main">
                        Tableau de bord
                    </h1>
                </div>

                <div class="flex items-center gap-4">
                    <!-- Notifications -->
                    <button class="relative p-2 rounded-lg hover:bg-border-lighter transition-colors">
                        <i class="fas fa-bell text-text-secondary"></i>
                        <span class="absolute top-1 right-1 w-2 h-2 bg-danger rounded-full"></span>
                    </button>

                    <!-- Profil Admin -->
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-accent/10 flex items-center justify-center">
                            <i class="fas fa-user text-accent text-sm"></i>
                        </div>
                        <div class="hidden md:block">
                            <p class="text-sm font-medium text-text-main">{{ request.user.username }}</p>
                            <p class="text-xs text-text-secondary">Administrateur</p>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Page Content -->
            <main class="flex-1 overflow-y-auto p-6">
             
            </main>

        </div>
    </div>

    <!-- Script pour toggle sidebar mobile -->
    <script>
        const sidebar = document.getElementById('sidebar');
        const sidebarToggle = document.getElementById('sidebarToggle');

        sidebarToggle.addEventListener('click', () => {
            sidebar.classList.toggle('-translate-x-full');
            sidebar.classList.toggle('absolute');
            sidebar.classList.toggle('z-50');
            sidebar.classList.toggle('h-full');
        });
    </script>

</body>
</html>
